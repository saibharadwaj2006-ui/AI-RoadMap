services:
  # 1. Database
  - type: pserv
    name: roadmap-db
    env: postgres
    plan: free
    region: ohio
    databaseName: roadmap_db
    user: roadmap_user

  # 2. FastAPI Backend
  - type: web
    name: roadmap-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roadmap-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # User must set this in the Render dashboard

  # 3. Next.js Frontend
  - type: web
    name: roadmap-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: roadmap-backend
          property: url
