version: "1"

databases:
  - name: roadmap-db
    databaseName: roadmap_db
    user: roadmap_user
    plan: free
    region: ohio

services:
  - type: web
    name: roadmap-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roadmap-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: roadmap-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    plan: free
    region: ohio
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
